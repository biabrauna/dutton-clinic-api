version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: clinica_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: clinica
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinica_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/clinica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
      DATABASE_USERNAME: root
      DATABASE_PASSWORD: root
      JWT_SECRET: clinicaDuttonSecretKeyForJWTTokenGeneration32Chars!
    depends_on:
      db:
        condition: service_healthy

  # Frontend deployado separadamente (repositório próprio).
  # Para rodar localmente: cd ../frontend && npm run dev
  # Para rodar containerizado: docker run -p 5173:80 clinica-frontend

volumes:
  mysql_data:
