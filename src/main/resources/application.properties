spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/clinica?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:ifgoiano}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway — migrations versionadas (arquivos em db/migration/)
# Desabilitado em runtime pois o banco Railway foi criado antes da
# adoção do Flyway. As migrations servem como documentação do schema
# e podem ser executadas em ambientes novos com flyway.enabled=true.
spring.flyway.enabled=false

jwt.secret=${JWT_SECRET:clinica-dutton-segredo-super-secreto-deve-ter-32-bytes!}
jwt.expiration-ms=86400000

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=0

server.port=${PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
