spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/clinica?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:ifgoiano}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway — executa migrations ao iniciar
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2
# Permite DDL (CREATE PROCEDURE, ALTER TABLE) dentro de migrations
spring.flyway.mixed=true

jwt.secret=${JWT_SECRET:clinica-dutton-segredo-super-secreto-deve-ter-32-bytes!}
jwt.expiration-ms=86400000

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=0

server.port=${PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
